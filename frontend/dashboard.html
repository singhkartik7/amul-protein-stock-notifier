<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

    <div class="container">

        <h1>Amul Protein Tracker</h1>

        <h2 id="welcome">
            Welcome 👋
        </h2>

        <div class="pincode-box">

            <label>Pincode</label>

            <input
                type="text"
                id="pincode"
                maxlength="6"
                placeholder="Enter your pincode">

        </div>
<input
    type="text"
    id="searchProduct"
    placeholder="🔍 Search products..."
>
        <h3>Select Products</h3>

        <div id="productsContainer">

            <!-- Product cards will appear here -->

        </div>

      <hr>

<div class="notification-box">

    <h3>🔔 Notification Settings</h3>

    <label for="notifyDays">

        Notify me for

    </label>

    <select id="notifyDays">

        <option value="1">1 Day</option>

        <option value="3">3 Days</option>

        <option value="7" selected>7 Days</option>

        <option value="15">15 Days</option>

        <option value="30">30 Days</option>

    </select>

    <div class="notificationButtons">

        <button id="activateNotificationBtn">

            🟢 Activate Notifications

        </button>

        <button id="stopNotificationBtn">

            🔴 Stop Notifications

        </button>

    </div>

    <p id="notificationStatus">

        🔴 Notifications Stopped

    </p>

</div>

<hr>

<button id="saveBtn">
    💾 Save Preferences
</button>

<button id="resetBtn">
    🔄 Reset Preferences
</button>

<div class="telegram-box">

            <h3>Telegram</h3>

            <p id="telegramStatus">
                🔴 Not Connected
            </p>

           <div class="telegramButtons">

    <button id="telegramBtn">
        Connect Telegram
    </button>

    <button id="disconnectTelegramBtn">
        Disconnect Telegram
    </button>

</div>

        </div>

        <button id="logoutBtn">
            Logout
        </button>

        <button id="deleteBtn">
    Delete Account
</button>

    </div>

    <script src="js/dashboard.js"></script>
<div id="toast">

</div>
</body>

</html>
