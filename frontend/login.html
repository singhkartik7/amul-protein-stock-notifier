<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="css/login.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>Welcome Back</h1>

        <p>
            Login to continue tracking products.
        </p>

        <input
            id="username"
            type="text"
            placeholder="Username">

        <input
            id="password"
            type="password"
            placeholder="Password">

        <button id="loginBtn">
            Login
        </button>

        <a href="signup.html">
            Don't have an account? Create one
        </a>

    </div>

</div>
<script src="js/config.js"></script>
<script src="js/login.js"></script>


</body>

</html>
